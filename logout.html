<!DOCTYPE html>
<html>
<head>
    <title>Logged Out | Giving Tree</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/style/base.css">
    <link rel="stylesheet" href="/assets/style/component.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { 
            background: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), 
                        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .logout-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logout-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logout-icon {
            width: 80px;
            height: 80px;
            background: rgba(26, 188, 156, 0.1);
            color: #1abc9c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 25px;
        }

        .logout-card h2 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .logout-card p {
            color: #7f8c8d;
            margin-bottom: 35px;
            font-size: 16px;
            line-height: 1.5;
        }

        .btn-relogin {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
    <div class="logo"><i class="fas fa-leaf"></i> Giving Tree</div>

    <div class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/items.html">Browse</a>
        <a href="/post-item.html">Give Item</a>
        <a href="/my-items.html">My Items</a>

        <div class="user-section">
            <a href="/login.html" style="border:none; color:white;">Login</a>
            <a href="/register.html" class="register-btn">Join Now</a>
        </div>
    </div>
</div>

<!-- ✅ MAIN CONTENT -->
<div class="logout-container">
    <div class="logout-card">

        <div class="logout-icon">
            <i class="fas fa-sign-out-alt"></i>
        </div>

        <h2>See you soon!</h2>
        <p>You have been safely logged out. Thank you for being a part of our sharing community.</p>

        <a href="/login.html" class="btn primary btn-relogin">
            <i class="fas fa-user" style="margin-right: 10px;"></i> Login Again
        </a>

        <div style="margin-top: 25px;">
            <a href="/index.html" style="color: #1abc9c; text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>

    </div>
</div>

<!-- ✅ SCRIPT (MUST BE AT BOTTOM) -->
<script>
const BACKEND_URL = "https://giving-tree-backend.onrender.com";

fetch(`${BACKEND_URL}/api/user`, {
    credentials: "include"
})
.then(res => res.json())
.then(data => {
    const nav = document.querySelector(".nav-links");

    if (data.loggedIn && nav) {
        nav.innerHTML = `
            <a href="/index.html">Home</a>
            <a href="/items.html">Browse</a>
            <a href="/post-item.html">Give Item</a>
            <a href="/my-items.html">My Items</a>
            <a href="/requests.html">Requests</a>

            ${data.role === 'admin' 
                ? `<a href="https://giving-tree-backend.onrender.com/admin/dashboard" style="color:#ff4757;">Admin</a>` 
                : ''
            }

            <a href="https://giving-tree-backend.onrender.com/logout">Logout</a>
        `;
    }
});
</script>

</body>
</html>
